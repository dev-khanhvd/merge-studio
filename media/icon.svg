    <rect x="40" y="116" width="36" height="22" rx="5" fill="#E06A52"/>
  </g>
  <!-- RIGHT editor (theirs) -->
  <g>
    <rect x="172" y="56" width="52" height="146" rx="9" fill="#454F62" stroke="#5A6679" stroke-width="1.5"/>
    <rect x="173.5" y="57.5" width="49" height="60" rx="8" fill="url(#cs)"/>
